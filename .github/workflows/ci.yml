name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.ico"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.ico"

jobs:
  format:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  server:
    name: "Server / Type Check, Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w server

      - name: Type check
        run: npm run typecheck -w server

      - name: Build
        run: npm run build -w server

      - name: Test
        run: npm run test -w server

  shared:
    name: "Shared / Type Check, Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w shared

      - name: Type check
        run: npm run typecheck -w shared

      - name: Build
        run: npm run build -w shared

      - name: Test
        run: npm run test -w shared

  client:
    name: "Client / Type Check, Lint, Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck -w client

      - name: Lint
        run: npm run lint -w client

      - name: Build
        run: npm run build -w client

      - name: Test
        run: npm run test -w client
