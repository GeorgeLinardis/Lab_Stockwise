name: Security Audit

# Runs automatically every 5 days at 9am UTC.
# workflow_dispatch allows triggering manually from the Actions UI.
on:
  schedule:
    - cron: "0 9 */5 * *"
  workflow_dispatch:

# Read-only — we only install and audit, never write.
permissions:
  contents: read

jobs:
  audit:
    name: "npm audit (high+)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980 # v6.4.0
        with:
          node-version: 24

      # --audit-level=high means the job only fails on high or critical findings.
      # Moderate/low are informational and won't block CI.
      - name: Audit client
        working-directory: client
        run: npm audit --audit-level=high

      - name: Audit server
        working-directory: server
        run: npm audit --audit-level=high
